<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>돌팔매쟁이 장현철</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
            touch-action: none; /* 모바일에서 스크롤 방지 */
        }
        h1 {
            margin: 15px 0 10px 0;
            font-size: 24px;
            text-shadow: 2px 2px 4px #000;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            /* 가로세로 비율 유지 (800:500) */
            aspect-ratio: 8 / 5; 
            background-color: #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
        .btn {
            padding: 12px 20px;
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-oh { background-color: #2ecc71; }
        .btn-oh:hover { background-color: #27ae60; }
        #ui-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #2c3e50;
            font-size: 16px;
            font-weight: bold;
            z-index: 5;
            pointer-events: none;
        }
        p {
            margin: 10px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>돌팔매쟁이 장현철</h1>
    
    <div id="game-container">
        <div id="ui-bar" class="hidden">
            <div id="time-display">버틴 시간: 0.00초</div>
            <div id="hp-display">생명: ♥♥♥</div>
        </div>

        <div id="start-screen" class="overlay">
            <h2>캐릭터 선택</h2>
            <div>
                <button class="btn" onclick="startGame('이종석', '#3498db')">이종석</button>
                <button class="btn btn-oh" onclick="startGame('오재호', '#2ecc71')">오재호</button>
            </div>
            <p>💻 PC: 방향키 이동<br>📱 모바일: 화면 터치 후 드래그</p>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h2 style="color: #e74c3c;">게임 오버!</h2>
            <h3 id="final-time">버틴 시간: 0초</h3>
            <button class="btn" onclick="showStartScreen()">다시 하기</button>
        </div>

        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const uiBar = document.getElementById('ui-bar');
        const timeDisplay = document.getElementById('time-display');
        const hpDisplay = document.getElementById('hp-display');
        const finalTimeDisplay = document.getElementById('final-time');

        let animationId;
        let isPlaying = false;
        let startTime;
        let elapsedTime = 0;
        let keys = {};

        let player = { x: 100, y: 250, width: 40, height: 40, speed: 6, color: '', name: '', hp: 3 };
        let enemy = { x: 700, y: 250, width: 50, height: 80, speed: 2, color: '#e74c3c', name: '장현철' };
        let stones = [];
        
        let baseSpawnRate = 1000;
        let lastSpawnTime = 0;

        // PC 키보드 입력
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // 모바일 터치 및 드래그 처리
        function handleTouch(e) {
            e.preventDefault(); // 스크롤 방지
            if (!isPlaying) return;

            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            
            // CSS 크기와 실제 캔버스 해상도(800x500) 비율 계산
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            // 터치 위치 계산 (캐릭터 중앙이 손가락에 오도록)
            let touchX = (touch.clientX - rect.left) * scaleX;
            let touchY = (touch.clientY - rect.top) * scaleY;

            player.x = touchX - player.width / 2;
            player.y = touchY - player.height / 2;

            // 캐릭터가 화면 밖으로 나가지 않게 경계 설정
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > enemy.x - 50) player.x = enemy.x - 50 - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        }

        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });

        function showStartScreen() {
            gameOverScreen.classList.add('hidden');
            uiBar.classList.add('hidden');
            startScreen.classList.remove('hidden');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function startGame(playerName, playerColor) {
            startScreen.classList.add('hidden');
            uiBar.classList.remove('hidden');
            
            player.name = playerName;
            player.color = playerColor;
            player.hp = 3;
            player.x = 100;
            player.y = canvas.height / 2 - player.height / 2;
            
            enemy.y = canvas.height / 2 - enemy.height / 2;
            stones = [];
            
            startTime = Date.now();
            lastSpawnTime = startTime;
            isPlaying = true;
            
            updateHPDisplay();
            gameLoop();
        }

        function updateHPDisplay() {
            let hearts = '';
            for(let i=0; i<player.hp; i++) hearts += '♥';
            hpDisplay.textContent = `생명: ${hearts}`;
            if(player.hp <= 1) hpDisplay.style.color = '#e74c3c';
            else hpDisplay.style.color = '#2c3e50';
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            uiBar.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            finalTimeDisplay.textContent = `기록: ${elapsedTime.toFixed(2)}초`;
        }

        function spawnStone() {
            const speedMultiplier = 1 + (elapsedTime / 10); 
            const radius = 8 + Math.random() * 7;
            const x = enemy.x;
            const y = enemy.y + enemy.height / 2;
            
            const angle = Math.atan2((player.y + player.height/2) - y, player.x - x);
            const spread = (Math.random() - 0.5) * 0.5; 
            
            const speed = (5 + Math.random() * 3) * speedMultiplier;
            const vx = Math.cos(angle + spread) * speed;
            const vy = Math.sin(angle + spread) * speed;

            stones.push({ x, y, vx, vy, radius });
        }

        function update() {
            const now = Date.now();
            elapsedTime = (now - startTime) / 1000;
            timeDisplay.textContent = `버틴 시간: ${elapsedTime.toFixed(2)}초`;

            // 키보드 조작 (터치 미사용 시)
            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y + player.height < canvas.height) player.y += player.speed;
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x + player.width < enemy.x - 50) player.x += player.speed;

            // 장현철(적) 상하 이동 패턴
            enemy.y += Math.sin(now / 300) * 4;
            if (enemy.y < 0) enemy.y = 0;
            if (enemy.y + enemy.height > canvas.height) enemy.y = canvas.height - enemy.height;

            // 돌 생성 주기
            const currentSpawnRate = Math.max(150, baseSpawnRate - elapsedTime * 35); 
            if (now - lastSpawnTime > currentSpawnRate) {
                spawnStone();
                lastSpawnTime = now;
            }

            // 돌 이동 및 충돌 판정
            for (let i = stones.length - 1; i >= 0; i--) {
                let s = stones[i];
                s.x += s.vx;
                s.y += s.vy;

                let testX = s.x;
                let testY = s.y;

                if (s.x < player.x) testX = player.x;
                else if (s.x > player.x + player.width) testX = player.x + player.width;
                if (s.y < player.y) testY = player.y;
                else if (s.y > player.y + player.height) testY = player.y + player.height;

                let distX = s.x - testX;
                let distY = s.y - testY;
                let distance = Math.sqrt((distX*distX) + (distY*distY));

                if (distance <= s.radius) {
                    stones.splice(i, 1);
                    player.hp--;
                    updateHPDisplay();
                    
                    ctx.fillStyle = 'rgba(231, 76, 60, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (player.hp <= 0) {
                        gameOver();
                        return;
                    }
                } 
                else if (s.x < -20 || s.y < -20 || s.y > canvas.height + 20) {
                    stones.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 장현철 그리기
            ctx.fillStyle = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            ctx.fillStyle = 'black';
            ctx.font = 'bold 14px Malgun Gothic';
            ctx.fillText(enemy.name, enemy.x + 3, enemy.y - 10);

            // 플레이어 그리기
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = 'black';
            ctx.font = 'bold 14px Malgun Gothic';
            ctx.fillText(player.name, player.x, player.y - 10);

            // 돌 그리기
            ctx.fillStyle = '#7f8c8d';
            for (let s of stones) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            }
        }

        function gameLoop() {
            if (!isPlaying) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
